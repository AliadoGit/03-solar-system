<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Solar System</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Background layer with generated stars -->
  <div class="stars" aria-hidden="true"></div>

  <!-- Controls: pause/resume + speed slider -->
  <div class="controls">
    <button id="toggle-btn" type="button">Pause</button>
    <label for="speed-slider">
      Speed
      <input id="speed-slider" type="range" min="0.1" max="4" step="0.1" value="1" />
    </label>
  </div>

  <!-- Solar system stage: everything is centered inside this container -->
  <main class="solar-system" aria-label="Solar system simulation">

    <!-- Sun sits at the very center, with a glow effect -->
    <div class="sun" aria-label="Sun">
      <span class="planet-label">Sun</span>
    </div>

    <!-- Each planet lives inside its own "orbit" wrapper.          -->
    <!-- The orbit div is the element that actually rotates (via CSS animation). -->
    <!-- The planet div is offset from the center so it travels along the orbit's edge. -->

    <div class="orbit" style="--orbit-size: 90px; --duration: 4s;">
      <div class="planet mercury" style="--planet-size: 8px;">
        <span class="planet-label">Mercury</span>
      </div>
    </div>

    <div class="orbit" style="--orbit-size: 130px; --duration: 7s;">
      <div class="planet venus" style="--planet-size: 12px;">
        <span class="planet-label">Venus</span>
      </div>
    </div>

    <div class="orbit" style="--orbit-size: 175px; --duration: 10s;">
      <div class="planet earth" style="--planet-size: 13px;">
        <!-- Earth has its own nested orbit for the Moon -->
        <div class="moon-orbit">
          <div class="moon"></div>
        </div>
        <span class="planet-label">Earth</span>
      </div>
    </div>

    <div class="orbit" style="--orbit-size: 220px; --duration: 15s;">
      <div class="planet mars" style="--planet-size: 10px;">
        <span class="planet-label">Mars</span>
      </div>
    </div>

    <div class="orbit" style="--orbit-size: 280px; --duration: 26s;">
      <div class="planet jupiter" style="--planet-size: 26px;">
        <span class="planet-label">Jupiter</span>
      </div>
    </div>

    <div class="orbit" style="--orbit-size: 340px; --duration: 34s;">
      <div class="planet saturn" style="--planet-size: 22px;">
        <div class="saturn-ring"></div>
        <span class="planet-label">Saturn</span>
      </div>
    </div>

    <div class="orbit" style="--orbit-size: 395px; --duration: 42s;">
      <div class="planet uranus" style="--planet-size: 17px;">
        <span class="planet-label">Uranus</span>
      </div>
    </div>

    <div class="orbit" style="--orbit-size: 445px; --duration: 50s;">
      <div class="planet neptune" style="--planet-size: 16px;">
        <span class="planet-label">Neptune</span>
      </div>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
